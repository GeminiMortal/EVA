version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: eve_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: eve_admin
      MONGO_INITDB_ROOT_PASSWORD: eve_secure_password
      MONGO_INITDB_DATABASE: eve_db

  redis:
    image: redis:7-alpine
    container_name: eve_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: eve_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://eve_admin:eve_secure_password@mongodb:27017/eve_db?authSource=admin
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ENCRYPTION_IV: ${ENCRYPTION_IV}
      AI_CORE_URL: http://ai_core:8000
    depends_on:
      - mongodb
      - redis

  ai_core:
    build:
      context: ../ai-core
      dockerfile: Dockerfile
    container_name: eve_ai_core
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ai_models:/app/models
      - ai_data:/app/data
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  admin:
    build:
      context: ../admin
      dockerfile: Dockerfile
    container_name: eve_admin
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: eve_frontend
    restart: always
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongodb_data:
  redis_data:
  ai_models:
  ai_data:
