version: '3.8'

services:
  # PostgreSQL 数据库
  db:
    image: postgres:15-alpine
    container_name: virtual_gf_db
    environment:
      POSTGRES_DB: virtual_gf
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secure_password_123}
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    volumes:
      - ./postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d virtual_gf"]
      interval: 30s
      timeout: 10s
      retries: 3

  # 后端 API 服务
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: virtual_gf_api
    environment:
      DATABASE_URL: postgresql://admin:${DB_PASSWORD:-secure_password_123}@db:5432/virtual_gf
      API_HOST: 0.0.0.0
      API_PORT: 8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./app:/app
      - ./logs:/app/logs

  # 可选：Redis 缓存（用于会话管理）
  redis:
    image: redis:7-alpine
    container_name: virtual_gf_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    volumes:
      - ./redis_data:/data

volumes:
  postgres_data:
  redis_data: