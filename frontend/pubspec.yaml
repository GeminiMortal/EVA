name: eve_app
description: EVE AI 情感治愈陪伴应用
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  
  provider: ^6.1.1
  http: ^1.1.0
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.18.1
  
  audioplayers: ^4.1.0
  record: ^5.0.1
  permission_handler: ^11.1.0
  
  animations: ^2.0.8
  flutter_staggered_grid_view: ^0.7.0
  cached_network_image: ^3.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/fonts/
